heat_template_version: 2013-05-23

description: "VM для Java 23 приложения с Docker (lobanov-bot)"

# Параметры
parameters:
  key_name:
    type: string
    description: "Имя SSH ключа для доступа к VM"
    default: lobanov
  
  flavor:
    type: string
    description: "Размер виртуальной машины"
    default: m1.small
  
  image:
    type: string
    description: "Образ операционной системы"
    default: ununtu-22.04
  
  network_name:
    type: string
    description: "Имя сети для подключения VM"
    default: sutdents-net
  
  owner:
    type: string
    description: "Владелец машины (имя агента)"
    default: lobanov

resources:
  # Группа безопасности (фаервол)
  app_security_group:
    type: OS::Neutron::SecurityGroup
    deletion_policy: Delete
    properties:
      name: lobanov-bot-sg
      description: "Security group for lobanov-bot application"
      rules:
        # SSH для подключения
        - protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: 0.0.0.0/0
        
        # Порт приложения
        - protocol: tcp
          port_range_min: 8080
          port_range_max: 8080
          remote_ip_prefix: 0.0.0.0/0
        
        # Docker registry (опционально)
        - protocol: tcp
          port_range_min: 5000
          port_range_max: 5000
          remote_ip_prefix: 0.0.0.0/0

  # Виртуальная машина с приложением
  app_server:
    type: OS::Nova::Server
    deletion_policy: Delete
    properties:
      # Динамическое имя сервера
      name: 
        str_replace:
          template: "bitbotx-vm-${owner}"
          params:
            ${owner}: { get_param: owner }
      
      flavor: { get_param: flavor }
      image: { get_param: image }
      key_name: { get_param: key_name }
      
      # Подключение к сети
      networks:
        - network: { get_param: network_name }
      
      security_groups:
        - default
        - { get_resource: app_security_group }
      
      # Формат user-data
      user_data_format: RAW
      
      # Скрипт инициализации
      user_data: |
        #!/bin/bash
        set -e
        
        # Логирование всех действий
        exec > /var/log/heat-setup.log 2>&1
        echo "Начало установки: $(date)"
        
        # === 1. Обновление системы ===
        echo "1. Обновление пакетов системы"
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -y
        apt-get upgrade -y
        
        # === 2. Установка Java 23 (Adoptium) ===
        echo "2. Установка Java 23"
        apt-get install -y wget apt-transport-https gnupg curl
        
        # Добавляем GPG-ключ Adoptium
        wget -q https://packages.adoptium.net/artifactory/api/gpg/key/public -O - | gpg --dearmor -o /usr/share/keyrings/adoptium.gpg
        
        # Добавляем репозиторий
        echo "deb [signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/adoptium.list
        
        apt-get update
        apt-get install -y temurin-23-jdk
        
        echo "Проверка Java:"
        java -version
        javac -version
        
        # === 3. Установка Docker ===
        echo "3. Установка Docker"
        apt-get install -y apt-transport-https ca-certificates curl software-properties-common
        
        # Добавление GPG ключа Docker
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        
        # Добавление репозитория Docker
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
        
        apt-get update
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
        
        echo "Проверка Docker:"
        docker --version
        docker compose version
        
        # Настройка прав для Docker
        echo "4. Настройка прав для Docker"
        usermod -aG docker ubuntu
        
        # === 5. Создание директории для приложения ===
        echo "5. Создание директорий"
        mkdir -p /opt/myapp
        mkdir -p /opt/myapp/logs
        chown -R ubuntu:ubuntu /opt/myapp
        
        # === 6. Создание systemd сервиса ===
        echo "6. Создание systemd сервиса"
        cat > /etc/systemd/system/myapp.service << 'EOF'
        [Unit]
        Description=Lobanov Bot Java Service
        After=network.target
        
        [Service]
        Type=simple
        User=ubuntu
        Group=ubuntu
        WorkingDirectory=/opt/myapp
        ExecStart=/usr/bin/java -Xmx512m -jar /opt/myapp/app.jar
        Restart=on-failure
        RestartSec=10
        StandardOutput=journal
        StandardError=journal
        SyslogIdentifier=myapp
        
        # Переменные окружения
        Environment="JAVA_HOME=/usr/lib/jvm/temurin-23-jdk-amd64"
        Environment="VAULT_ADDR=http://localhost:8200"
        Environment="VAULT_TOKEN=root"
        Environment="SERVER_PORT=8080"
        Environment="MONGO_INITDB_ROOT_USERNAME=root"
        Environment="MONGO_INITDB_ROOT_PASSWORD=example"
        Environment="MONGO_INITDB_DATABASE=BitBotDB"
        
        [Install]
        WantedBy=multi-user.target
        EOF
        
        # === 7. Активация сервиса ===
        echo "7. Активация сервиса"
        systemctl daemon-reload
        systemctl enable myapp
        
        # === 8. Установка дополнительных утилит ===
        echo "8. Установка дополнительных утилит"
        apt-get install -y git net-tools htop jq
        
        # === 9. Финальное сообщение ===
        touch /tmp/user-data-completed
        echo "✅ Установка завершена: $(date)"
        echo "📋 Лог установки доступен в /var/log/heat-setup.log"

# Выходные параметры
outputs:
  server_ip:
    description: "Публичный IP адрес сервера"
    value: { get_attr: [app_server, first_address] }
  
  server_name:
    description: "Имя созданной VM"
    value: { get_attr: [app_server, name] }
  
  server_id:
    description: "ID сервера"
    value: { get_ref: app_server }
  
  ssh_command:
    description: "Команда для подключения по SSH"
    value:
      str_replace:
        template: "ssh -i <key> ubuntu@$ip"
        params:
          $ip: { get_attr: [app_server, first_address] }
  
  setup_log:
    description: "Инструкция для просмотра лога установки"
    value: "sudo cat /var/log/heat-setup.log"
  
  check_status:
    description: "Проверка завершения установки"
    value: "ssh -i <key> ubuntu@$ip 'test -f /tmp/user-data-completed && echo OK || echo NOT_READY'"
  
  service_status:
    description: "Проверка статуса сервиса"
    value: "ssh -i <key> ubuntu@$ip 'sudo systemctl status myapp --no-pager'"
  
  docker_status:
    description: "Проверка Docker"
    value: "ssh -i <key> ubuntu@$ip 'docker --version && docker compose version'"
